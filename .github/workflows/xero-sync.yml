name: Xero sync (12-hourly)

# Polls the production deploy's /api/cron/xero-sync endpoint twice a day. Free alternative
# to Vercel Cron (which requires the paid plan for sub-daily intervals).
#
# TWO calls per run: the cost sync, then ?task=extras (timesheet-hours pull + subbie
# compliance chase). Combined in one invocation they intermittently blew Vercel's 300s
# function ceiling (504 Runtime Timeout) whenever Xero rate-limited - each 429 backoff
# sleeps ~65s. Split, each call has plenty of headroom.
#
# Required GitHub repo secrets:
#   APP_URL       e.g. https://formation-group.vercel.app
#   CRON_SECRET   shared secret also set in the Vercel env var of the same name

on:
  schedule:
    # 21:00 + 09:00 UTC = ~7am + ~7pm Melbourne: fresh figures at the start of the work day
    # and again in the evening. GitHub may delay by up to ~15 min under load; that's fine.
    - cron: '0 9,21 * * *'
  workflow_dispatch:  # manual run from the Actions tab for debugging

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Xero sync
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail

          # Guard: if the GitHub repo secrets aren't set yet, exit 0 with a clear notice.
          if [[ -z "${APP_URL:-}" || -z "${CRON_SECRET:-}" ]]; then
            echo "::notice::Required secrets not set yet (APP_URL or CRON_SECRET). Skipping. Set them at Settings → Secrets and variables → Actions."
            exit 0
          fi

          call() {  # call <url> -> echoes status + body; sets CALL_STATUS / CALL_BODY
            local response
            response=$(curl -sS -L -X POST \
              -H "Authorization: Bearer ${CRON_SECRET}" \
              -H "Content-Type: application/json" \
              --max-time 320 \
              -w "\n%{http_code}" \
              "$1")
            CALL_BODY=$(echo "$response" | head -n -1)
            CALL_STATUS=$(echo "$response" | tail -n 1)
            echo "HTTP $CALL_STATUS"
            echo "$CALL_BODY"
          }

          # 1) Cost sync (bills + spend money + production labour).
          call "${APP_URL}/api/cron/xero-sync"
          if [[ ! "$CALL_STATUS" =~ ^2 ]]; then
            echo "::error::Cost sync failed with HTTP $CALL_STATUS. Check Vercel env vars (CRON_SECRET, SUPABASE_SERVICE_ROLE_KEY) and the Xero connection."
            exit 1
          fi
          if echo "$CALL_BODY" | grep -q '"skipped":true'; then
            echo "::notice::Cost sync ran but skipped — most likely 'no_xero_tokens' (Xero not connected) or 'supabase_admin_not_configured'."
          fi

          # 2) Extras: timesheet-hours pull + subbie compliance chase. Both are internally
          # throttled/deduped and catch up next run, so a failure here WARNS but doesn't fail
          # the workflow (no failure-email storm for a transient Xero 429).
          call "${APP_URL}/api/cron/xero-sync?task=extras"
          if [[ ! "$CALL_STATUS" =~ ^2 ]]; then
            echo "::warning::Extras (timesheet hours / compliance chase) failed with HTTP $CALL_STATUS - will retry next run."
          fi
