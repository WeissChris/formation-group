name: Xero hourly sync

# Polls the production deploy's /api/cron/xero-sync endpoint hourly. Free alternative
# to Vercel Cron (which requires the paid plan for sub-daily intervals).
#
# Required GitHub repo secrets:
#   APP_URL       e.g. https://formation-group.vercel.app
#   CRON_SECRET   shared secret also set in the Vercel env var of the same name

on:
  schedule:
    # Every hour on the hour. GitHub may delay by up to ~15 min under load; that's fine
    # for a cost-cache refresh.
    - cron: '0 * * * *'
  workflow_dispatch:  # manual run from the Actions tab for debugging

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Xero sync
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail

          # Guard: if the GitHub repo secrets aren't set yet, exit 0 with a clear notice.
          # Stops hourly failure emails until you finish setup.
          if [[ -z "${APP_URL:-}" || -z "${CRON_SECRET:-}" ]]; then
            echo "::notice::Required secrets not set yet (APP_URL or CRON_SECRET). Skipping. Set them at Settings → Secrets and variables → Actions."
            exit 0
          fi

          response=$(curl -sS -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            -w "\n%{http_code}" \
            "${APP_URL}/api/cron/xero-sync")
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "HTTP $status"
          echo "$body"

          # 2xx = success (or 200 + skipped:true for known pre-setup states).
          # The server returns 200 with {skipped:true} when Xero isn't connected yet —
          # surface that as a notice rather than letting it look like a real result.
          if [[ "$status" =~ ^2 ]]; then
            if echo "$body" | grep -q '"skipped":true'; then
              echo "::notice::Cron ran but skipped — see response body. Most likely 'no_xero_tokens' (Xero not connected via Settings) or 'supabase_admin_not_configured'."
            fi
            exit 0
          fi

          # 401 = secret mismatch between GitHub and Vercel
          # 503 = CRON_SECRET not set on Vercel side
          # 502 = real downstream failure (Xero API error, network, etc)
          echo "::error::Cron failed with HTTP $status. Check Vercel env vars (CRON_SECRET, SUPABASE_SERVICE_ROLE_KEY) and the Xero connection."
          exit 1
